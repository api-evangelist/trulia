aid: trulia
name: Trulia
description: >-
  Trulia is a U.S. home and rental search portal owned by Zillow Group since
  the 2015 acquisition. Trulia is best known for its neighborhood data layer,
  combining listings with crime, school, commute, transit, noise, flood, and
  resident sentiment information overlaid on the map. After the Zillow Group
  consolidation, Trulia's historical public APIs (the Trulia Hotpads /
  Property / Stats / Schools / Locations APIs) were deprecated and shut down.
  Trulia listings, agent, and rental data are now distributed through Zillow
  Group programs (Bridge Interactive, Zillow Tech Connect, HotPads). This
  profile is maintained as an honest historical record and pointer to the
  successor Zillow Group developer surfaces.
