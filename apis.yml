apis:
  - aid: trulia:trulia-api-historical
    name: Trulia API (Historical / Sunset)
    description: >-
      The Trulia API was a suite of public XML/JSON endpoints that exposed
      listings, property details, location lookups, neighborhood statistics,
      and school data. The full suite was deprecated after Trulia was
      absorbed into Zillow Group, and the developer.trulia.com portal was
      taken offline. No new keys are issued. Equivalent data is now available
      only to licensed real-estate professionals through Bridge Interactive.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.trulia.com
    baseURL: https://api.trulia.com
    tags:
      - Deprecated
      - Listings
      - Neighborhoods
      - Real Estate
      - Sunset
    properties:
      - type: Successor
        url: https://bridgedataoutput.com
      - type: ParentCompany
        url: https://www.zillowgroup.com
  - aid: trulia:zillow-group-successor
    name: Zillow Group APIs (Successor)
    description: >-
      Programmatic access to data that historically lived behind the Trulia
      API is now delivered through Zillow Group's Bridge Interactive
      RESO-compliant data platform for MLSs and brokers, the Zillow Tech
      Connect partner program for vetted vendors, and the HotPads rentals
      surface. Access is gated, partner-only, and not self-serve.
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://www.zillowgroup.com/developers
    baseURL: https://api.bridgedataoutput.com
    tags:
      - Bridge
      - MLS
      - Partners
      - Real Estate
      - RESO
      - Zillow Group
    properties:
      - type: Portal
        url: https://www.zillowgroup.com/developers
      - type: Documentation
        url: https://bridgedataoutput.com/docs/platform/
